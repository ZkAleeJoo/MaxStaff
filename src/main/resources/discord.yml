#==========================================
#       MaxStaff - Discord Webhooks
#==========================================
webhook-url: "URL_AQUI"
enabled: true

# Global webhook identity/content. Leave blank to use Discord webhook defaults.
username: "MaxStaff Alerts"
avatar-url: ""
content: ""

# Global embed defaults. Section values override these.
global-image: "https://imgur.com/xLVotZb"
footer: "{server} • {timestamp}"
footer-icon: ""
timestamp: false
server-name: "Survival 1.20"

# Extra per-embed options supported in every alert below:
# enabled, username, avatar-url, content, author, author-icon, author-url,
# title, description, url, color, thumbnail, image, footer, footer-icon, timestamp, fields.
# Common placeholders: {server}, {timestamp}, {face}. Action-specific placeholders are shown in each section.

#==========================================
#       PUNISHMENTS LOGS
#==========================================
punishments:
  ban:
    enabled: true
    author: "User Banned"
    author-icon: "{face}"
    author-url: ""
    title: "🚫 Ban applied to {target}"
    description: "A staff member has applied a ban."
    url: ""
    color: "#ff0000"
    thumbnail: "{face}"
    image: ""
    footer: "{server} • {timestamp}"
    footer-icon: ""
    timestamp: false
    fields:
      - name: "👤 User"
        value: "`{target}`"
        inline: true
      - name: "🛡️ Staff"
        value: "`{staff}`"
        inline: true
      - name: "⏳ Duration"
        value: "**{duration}**"
        inline: false
      - name: "📝 Reason"
        value: "{reason}"
        inline: false

